name: Build and Release with Python3.13

on:
  release:
    types: [published]
  push:
    tags:
      - 220*
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag"
        required: true
      prerelease:
        description: "是否作为预发布（pre-release）"
        required: false
        default: "false"

jobs:
  init-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      # https://github.com/actions/runner/issues/1985#issuecomment-1573518052
      - name: Set matrix
        id: set-matrix
        run: |
          items=()

          # https://docs.github.com/en/actions/using-github-hosted-runners/about-github-hosted-runners/about-github-hosted-runners

          items+=('{"build": "macos", "os": "macos-latest", "arch": "aarch64"}')
          items+=('{"build": "macos", "os": "macos-13", "arch": "x86_64"}')

          items+=('{"build": "windows", "os": "windows-latest", "arch": "x86_64"}')

          # 合并items到json数组
          matrix="matrix=["
          for ((i=0; i<${#items[@]}; i++)); do
            matrix+=" ${items[i]}"
            if ((i != ${#items[@]}-1)); then
              matrix+=","
            fi
          done
          matrix+="]"

          # 输出matrix到GITHUB_OUTPUT
          echo $matrix >> $GITHUB_OUTPUT

  build-app:
    needs: init-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{fromJson(needs.init-matrix.outputs.matrix)}}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: "Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          activate-environment: true

      - name: Set up python env
        run: uv sync --locked --all-extras --de

      - name: Build Windows app - Windows
        if: ${{ matrix.build == 'windows' }}
        env:
          PYTHONIOENCODING: utf-8
        run: uv run scripts/build.py --debug

      - name: Get changelog
        id: get-changelog
        shell: bash
        run: |
          tag="${{ github.ref_name }}"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          fi
          uv run changelog --tag "$tag" --pattern "220*" --output changelog.md
          delimiter="__MDCX_CHANGELOG_EOF__"
          {
            echo "CHANGELOG<<$delimiter"
            cat changelog.md
            echo
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve release type
        id: release-type
        shell: bash
        run: |
          prerelease=false
          if [ "${{ github.event_name }}" = "release" ]; then
            prerelease="${{ github.event.release.prerelease }}"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.prerelease }}" = "true" ]; then
            prerelease=true
          fi
          echo "prerelease=$prerelease" >> $GITHUB_OUTPUT

      - name: Save Windows executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: MDCx-${{ github.run_number }}
          path: dist/MDCx.exe
